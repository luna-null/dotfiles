# light themes good
theme = "bogster_light"

[editor]
# line-number = "relative"
true-color = true
undercurl = true
color-modes = true
cursorline = true
auto-save = true # save when window looses focus
idle-timeout = 0
# original gutters = ["diagnostics", "spacer", "line-numbers", "spacer", "diff"]
gutters = ["diagnostics", "spacer", "diff", "line-numbers", "spacer", "spacer"]


mouse = true

# use work on web development, never saw anything get "auto formatted"
auto-format = true

# if I paste code, extra auto pairs are generated so I turned it off
auto-pairs = false

[editor.lsp]
# yet to see this in action, supposedly some msg will be displayed on line below "status line"
# and yes all the language servers on in path and working in other editors
display-messages = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.indent-guides]
character = "⸽"

[editor.soft-wrap]
enable = true

[editor.statusline]
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"
right = ["diagnostics", "version-control", "position", "file-encoding"]
